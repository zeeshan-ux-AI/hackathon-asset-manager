services:
  - type: web
    name: smart-office-dashboard
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm run build:render
    startCommand: pnpm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: SERVE_STATIC_DASHBOARD
        value: "true"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_ALERT_CHANNEL_ID
        sync: false
