kind = "web"
previewPath = "/"
title = "Smart Office Dashboard"
version = "1.0.0"
id = "artifacts/office-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23020

[services.development]
run = "pnpm --filter @workspace/office-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/office-dashboard", "run", "build" ]
publicDir = "artifacts/office-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23020"
BASE_PATH = "/"
